<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Flame glow -->
    <radialGradient id="flameGlow" cx="50%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#FFF176" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>
    </radialGradient>
    <!-- Flame fill -->
    <linearGradient id="flameFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="40%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
    <!-- Inner flame -->
    <linearGradient id="innerFlame" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFF176" stop-opacity="0"/>
    </linearGradient>
    <!-- Candle body -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4734A"/>
      <stop offset="35%" stop-color="#E8875A"/>
      <stop offset="70%" stop-color="#F09A70"/>
      <stop offset="100%" stop-color="#C8633A"/>
    </linearGradient>
    <!-- Base -->
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C8633A"/>
      <stop offset="50%" stop-color="#E0795A"/>
      <stop offset="100%" stop-color="#B85A30"/>
    </linearGradient>
  </defs>

  <!-- Glow halo behind flame -->
  <ellipse cx="32" cy="16" rx="14" ry="12" fill="url(#flameGlow)" opacity="0.7"/>

  <!-- Flame outer -->
  <path d="M32 4 C28 8 24 12 25 17 C26 22 32 24 32 24 C32 24 38 22 39 17 C40 12 36 8 32 4 Z"
        fill="url(#flameFill)"/>

  <!-- Flame inner (highlight) -->
  <path d="M32 8 C30 11 29 14 30 17 C30.5 19 32 20 32 20 C32 20 33.5 19 34 17 C35 14 34 11 32 8 Z"
        fill="url(#innerFlame)"/>

  <!-- Wick -->
  <rect x="31" y="22" width="2" height="6" rx="1" fill="#4A3728"/>

  <!-- Wax drip on left side -->
  <path d="M22 34 Q21 38 22 41" stroke="#F09A70" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Candle body -->
  <rect x="20" y="28" width="24" height="24" rx="3" fill="url(#bodyGrad)"/>

  <!-- Shine on candle body -->
  <rect x="24" y="30" width="5" height="18" rx="2.5" fill="white" opacity="0.15"/>

  <!-- Base plate -->
  <rect x="17" y="52" width="30" height="5" rx="2.5" fill="url(#baseGrad)"/>

  <!-- Base plate shine -->
  <rect x="20" y="53" width="10" height="2" rx="1" fill="white" opacity="0.2"/>
</svg>
